<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - MonthlyBudget</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be+Vietnam+Pro', sans-serif;
        }
        h1, h2, h3, .brand-logo {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .bg-primary-gradient {
            background: linear-gradient(135deg, #9116c4 0%, #d67aff 100%);
        }
        .soft-elevation {
            box-shadow: 0px 20px 40px rgba(44, 47, 50, 0.06);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "secondary-fixed": "#ffbbfe",
                "error": "#b41340",
                "outline": "#74777a",
                "tertiary": "#a03837",
                "inverse-surface": "#0b0f11",
                "on-tertiary-fixed-variant": "#711518",
                "on-primary-fixed": "#000000",
                "on-surface": "#2c2f32",
                "primary-container": "#d67aff",
                "on-secondary-fixed": "#5c0b65",
                "secondary-fixed-dim": "#fda5ff",
                "tertiary-fixed-dim": "#fc7d78",
                "surface-variant": "#d9dde1",
                "surface-dim": "#d0d5d9",
                "on-secondary": "#ffeefa",
                "surface-container-highest": "#d9dde1",
                "primary-fixed-dim": "#ce63ff",
                "surface-container-low": "#eef1f4",
                "tertiary-dim": "#902c2c",
                "on-error": "#ffefef",
                "surface-container": "#e5e8ec",
                "error-container": "#f74b6d",
                "on-tertiary": "#ffefee",
                "on-secondary-container": "#72257a",
                "primary-fixed": "#d67aff",
                "on-error-container": "#510017",
                "on-secondary-fixed-variant": "#7d2f84",
                "tertiary-fixed": "#ff928c",
                "secondary-dim": "#7c2e83",
                "surface-bright": "#f5f7fa",
                "surface-tint": "#9116c4",
                "on-tertiary-fixed": "#3a0004",
                "secondary-container": "#ffbbfe",
                "primary": "#9116c4",
                "inverse-primary": "#cc5eff",
                "on-primary-fixed-variant": "#4b0069",
                "surface": "#f5f7fa",
                "on-tertiary-container": "#650a11",
                "on-surface-variant": "#595c5e",
                "error-dim": "#a70138",
                "on-primary": "#feeeff",
                "outline-variant": "#abadb0",
                "on-primary-container": "#3d0056",
                "inverse-on-surface": "#9a9da0",
                "tertiary-container": "#ff928c",
                "secondary": "#8a3b90",
                "on-background": "#2c2f32",
                "surface-container-lowest": "#ffffff",
                "primary-dim": "#8100b3",
                "surface-container-high": "#dfe3e7",
                "background": "#f5f7fa"
              },
              fontFamily: {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Be Vietnam Pro"],
                "label": ["Be Vietnam Pro"]
              },
              borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            },
          },
        }
      </script>
</head>
<body class="bg-[#f5f7fa] min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-[480px] flex flex-col items-center">
<!-- Logo Branding -->
<div class="mb-10 text-center">
<div class="flex items-center justify-center gap-2 mb-2">
<div class="w-12 h-12 rounded-lg bg-primary-gradient flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="account_balance_wallet" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
</div>
<h1 class="brand-logo text-3xl font-extrabold tracking-tight text-primary">MonthlyBudget</h1>
<p class="text-on-surface-variant font-body mt-2 text-sm tracking-wide">Your household budget, simplified.</p>
</div>
<!-- Auth Card -->
<div class="w-full bg-surface-container-lowest rounded-lg soft-elevation p-10 md:p-14 relative overflow-hidden rounded-lg soft-elevation">
<!-- Decorative Accent -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<div class="relative">
<header class="mb-8">
<h2 class="text-headline text-2xl font-bold text-on-surface">Welcome Back</h2>
<p class="text-body text-on-surface-variant text-sm mt-1">Please enter your details to sign in</p>
</header>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-label text-sm font-semibold text-on-surface ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container border-none rounded-sm text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/40 transition-all outline-none" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-label text-sm font-semibold text-on-surface" for="password">Password</label>
<a class="text-primary text-xs font-semibold hover:underline decoration-2 underline-offset-4" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container border-none rounded-sm text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/40 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-3 ml-1 py-1">
<input class="w-5 h-5 rounded-sm border-none bg-surface-container text-primary focus:ring-primary/40 cursor-pointer" id="remember" type="checkbox"/>
<label class="text-body text-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember for 30 days</label>
</div>
<button class="w-full py-4 bg-primary-gradient text-on-primary font-bold rounded-full shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 transition-all transform active:scale-[0.98] mt-4 bg-primary-gradient rounded-full text-white" type="submit">
                        Sign In
                    </button>
</form>
</div>
</div>
<!-- Footer Link -->
<p class="mt-8 text-on-surface-variant font-body text-sm">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Create one</a>
</p>
</main>
<!-- Global Footer Component from JSON -->
<footer class="w-full py-8 mt-12">
<div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
<div class="font-['Plus_Jakarta_SANS'] font-bold text-purple-700 dark:text-purple-400">MonthlyBudget</div>
<div class="flex gap-6">
<a class="text-slate-500 hover:text-purple-600 transition-colors font-['Be_Vietnam_Pro'] text-sm tracking-wide opacity-80 hover:opacity-100 duration-200" href="#">Privacy Policy</a>
<a class="text-slate-500 hover:text-purple-600 transition-colors font-['Be_Vietnam_Pro'] text-sm tracking-wide opacity-80 hover:opacity-100 duration-200" href="#">Terms of Service</a>
<a class="text-slate-500 hover:text-purple-600 transition-colors font-['Be_Vietnam_Pro'] text-sm tracking-wide opacity-80 hover:opacity-100 duration-200" href="#">Help Center</a>
</div>
<div class="text-slate-500 font-['Be_Vietnam_Pro'] text-sm tracking-wide opacity-80">
                © 2024 MonthlyBudget. All rights reserved.
            </div>
</div>
</footer>
</body></html>
